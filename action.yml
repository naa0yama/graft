# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: graft
description: Template sync CLI for pulling upstream files into downstream repos
author: naa0yama
branding:
  icon: refresh-cw
  color: blue

inputs:
  version:
    description: >
      Release tag to download (e.g. v0.1.0).
      Defaults to the ref used in the uses: line (github.action_ref).
      When pinning with a commit SHA, pass the corresponding release tag explicitly.
    required: false
    default: ${{ github.action_ref }}
  manifest:
    description: Path to the graft manifest file
    required: false
    default: .github/graft/config.yaml
  upstream-manifest:
    description: >
      Upstream manifest reference in owner/repo@ref:path format.
      When set, the manifest is fetched from the upstream repo and merged
      with the local manifest (if present).
    required: false
  token:
    description: >
      GitHub token for gh release download and for the gh CLI inside graft.
      Pass secrets.GITHUB_TOKEN or a PAT with repo read scope.
    required: true
  apply-files:
    description: >
      When true, run `sync file -y` to apply file changes instead of
      drift-checking. Repo settings are not checked in this mode.
    required: false
    default: "false"
  install-only:
    description: >
      When true, only install the graft binary and prepend it to PATH.
      Skip manifest validation, drift checks, and apply-files. Useful when
      you want to invoke graft subcommands directly from subsequent steps.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Resolve target triple
      id: target
      shell: bash
      run: |
        set -euo pipefail
        case "${RUNNER_OS}/${RUNNER_ARCH}" in
          Linux/X64)   TRIPLE="x86_64-unknown-linux-gnu"  ;;
          Linux/ARM64) TRIPLE="aarch64-unknown-linux-gnu" ;;
          macOS/ARM64) TRIPLE="aarch64-apple-darwin"      ;;
          macOS/X64)   TRIPLE="x86_64-apple-darwin"       ;;
          Windows/X64) TRIPLE="x86_64-pc-windows-msvc"    ;;
          *)
            echo "::error::Unsupported runner: ${RUNNER_OS}/${RUNNER_ARCH}"
            exit 1
            ;;
        esac
        echo "triple=${TRIPLE}" >> "$GITHUB_OUTPUT"

    - name: Resolve release tag
      id: resolve_tag
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        # When SHA-pinned, github.action_ref is a commit SHA, not a tag.
        # gh release download needs a tag, so reverse-lookup via tags API.
        if [[ "${VERSION}" =~ ^[0-9a-f]{40}$ ]]; then
          TAG=$(gh api repos/naa0yama/graft/tags --paginate \
            --jq ".[] | select(.commit.sha==\"${VERSION}\") | .name" \
            | head -n 1)
          if [[ -z "${TAG}" ]]; then
            echo "::error::no release tag matches SHA ${VERSION}"
            exit 1
          fi
          VERSION="${TAG}"
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Download graft binary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        VERSION: ${{ steps.resolve_tag.outputs.version }}
        TRIPLE: ${{ steps.target.outputs.triple }}
      run: | # zizmor: ignore[github-env] BIN_DIR derives from RUNNER_TEMP (trusted runner var)
        set -euo pipefail
        DEST="${RUNNER_TEMP}/graft"
        mkdir -p "${DEST}"

        if [[ "${RUNNER_OS}" == "Windows" ]]; then
          ASSET="graft-${VERSION}-${TRIPLE}.zip"
        else
          ASSET="graft-${VERSION}-${TRIPLE}.tar.gz"
        fi

        gh release download "${VERSION}" \
          --repo naa0yama/graft \
          --pattern "${ASSET}" \
          --pattern "SHA256SUMS" \
          --dir "${DEST}"

        cd "${DEST}"

        # Verify checksum (sha256sum on Linux, shasum on macOS)
        if command -v sha256sum >/dev/null 2>&1; then
          grep "${ASSET}" SHA256SUMS | sha256sum --check
        else
          grep "${ASSET}" SHA256SUMS | shasum -a 256 -c
        fi

        if [[ "${RUNNER_OS}" == "Windows" ]]; then
          unzip "${ASSET}"
        else
          tar -xzf "${ASSET}"
        fi

        BIN_DIR="${DEST}/bin"
        mkdir -p "${BIN_DIR}"
        if [[ "${RUNNER_OS}" == "Windows" ]]; then
          mv graft.exe "${BIN_DIR}/"
        else
          mv graft "${BIN_DIR}/"
        fi
        echo "${BIN_DIR}" >> "$GITHUB_PATH"

    - name: Validate manifest
      if: inputs.install-only != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        MANIFEST: ${{ inputs.manifest }}
        UPSTREAM_MANIFEST: ${{ inputs.upstream-manifest }}
      run: |
        set -euo pipefail
        ARGS=(--manifest "${MANIFEST}" --validate)
        if [[ -n "${UPSTREAM_MANIFEST}" ]]; then
          ARGS+=(--upstream-manifest "${UPSTREAM_MANIFEST}")
        fi
        graft sync file "${ARGS[@]}"

    - name: Drift check — repo settings
      if: inputs.install-only != 'true' && inputs.apply-files != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        MANIFEST: ${{ inputs.manifest }}
        UPSTREAM_MANIFEST: ${{ inputs.upstream-manifest }}
      run: |
        set -euo pipefail
        ARGS=(--manifest "${MANIFEST}" --ci-check)
        if [[ -n "${UPSTREAM_MANIFEST}" ]]; then
          ARGS+=(--upstream-manifest "${UPSTREAM_MANIFEST}")
        fi
        graft sync repo "${ARGS[@]}"

    - name: Drift check — files
      if: inputs.install-only != 'true' && inputs.apply-files != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        MANIFEST: ${{ inputs.manifest }}
        UPSTREAM_MANIFEST: ${{ inputs.upstream-manifest }}
      run: |
        set -euo pipefail
        ARGS=(--manifest "${MANIFEST}" --ci-check)
        if [[ -n "${UPSTREAM_MANIFEST}" ]]; then
          ARGS+=(--upstream-manifest "${UPSTREAM_MANIFEST}")
        fi
        graft sync file "${ARGS[@]}"

    - name: Apply file sync
      if: inputs.install-only != 'true' && inputs.apply-files == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        MANIFEST: ${{ inputs.manifest }}
        UPSTREAM_MANIFEST: ${{ inputs.upstream-manifest }}
      run: |
        set -euo pipefail
        ARGS=(--manifest "${MANIFEST}" -y)
        if [[ -n "${UPSTREAM_MANIFEST}" ]]; then
          ARGS+=(--upstream-manifest "${UPSTREAM_MANIFEST}")
        fi
        graft sync file "${ARGS[@]}"
